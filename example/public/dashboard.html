<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Knock Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e5;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .sign-out {
      background: none;
      border: 1px solid #d0d0d5;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      color: #1d1d1f;
    }

    .sign-out:hover { background: #f5f5f7; }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .welcome {
      font-size: 14px;
      color: #6e6e73;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .credential-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      border: 1px solid #e0e0e5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .credential-info strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .credential-info span {
      font-size: 13px;
      color: #6e6e73;
    }

    .revoke-btn {
      background: none;
      border: 1px solid #ff3b30;
      color: #ff3b30;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .revoke-btn:hover { background: #fff0ef; }

    .empty {
      background: #fff;
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      color: #6e6e73;
      font-size: 15px;
      border: 1px solid #e0e0e5;
    }
  </style>
</head>
<body>

  <header>
    <h1>Knock Demo</h1>
    <button class="sign-out" onclick="signOut()">Sign out</button>
  </header>

  <main>
    <div id="loading" style="text-align:center;padding:48px 0;color:#6e6e73;">Loading...</div>
    <div id="content" style="display:none;">
      <p class="welcome" id="welcome"></p>
      <h2>Passkeys</h2>
      <div id="credentials-list"></div>
    </div>
  </main>

  <script type="module">
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }

    const sessionId = getCookie('knock_session');

    const sessionRes = await fetch('/session/me', {
      headers: { Authorization: `Bearer ${sessionId}` }
    });
    if (!sessionRes.ok) {
      window.location = '/login.html';
      throw new Error('no session');
    }

    const { userId } = await sessionRes.json();
    document.getElementById('welcome').textContent = 'Signed in as Demo User';

    const credsRes = await fetch(`/auth/credentials/${userId}`, {
      headers: { Authorization: `Bearer ${sessionId}` }
    });
    const credentials = await credsRes.json();

    document.getElementById('loading').remove();
    document.getElementById('content').style.display = '';

    const credsList = document.getElementById('credentials-list');

    function inferName(cred) {
      const t = Array.isArray(cred.transports) ? cred.transports : [];
      if (t.includes('internal')) return 'This device';
      if (t.includes('hybrid')) return 'Phone';
      if (t.includes('usb')) return 'Security key (USB)';
      if (t.includes('nfc')) return 'Security key (NFC)';
      return cred.name || 'Passkey';
    }

    if (credentials.length === 0) {
      credsList.innerHTML = '<div class="empty">No passkeys registered.</div>';
    } else {
      credentials.forEach(cred => {
        const lastUsed = cred.lastUsedAt
          ? `Last used ${new Date(cred.lastUsedAt * 1000).toLocaleDateString()}`
          : `Registered ${new Date(cred.registeredAt * 1000).toLocaleDateString()}`;
        const div = document.createElement('div');
        div.className = 'credential-card';
        div.innerHTML = `
          <div class="credential-info">
            <strong>${inferName(cred)}</strong>
            <span>${lastUsed}</span>
          </div>
          <button class="revoke-btn" onclick="revoke('${cred.credentialId}')">Revoke</button>`;
        credsList.appendChild(div);
      });
    }

    window.signOut = function() {
      document.cookie = 'knock_session=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
      window.location = '/login.html';
    };

    window.revoke = async function(credentialId) {
      await fetch(`/auth/credentials/${credentialId}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${sessionId}` }
      });
      window.location.reload();
    };
  </script>
</body>
</html>
