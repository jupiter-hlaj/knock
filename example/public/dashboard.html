<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Dashboard — Knock Demo</title></head>
<body>
  <h1>Dashboard</h1>
  <p id="welcome"></p>
  <button onclick="signOut()">Sign Out</button>

  <h2>Your Credentials</h2>
  <div id="credentials-list"></div>

  <script type="module">
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }

    const sessionId = getCookie('knock_session');

    // Verify session
    const sessionRes = await fetch('/session/me', {
      headers: { Authorization: `Bearer ${sessionId}` }
    });
    if (!sessionRes.ok) {
      window.location = '/login.html';
      throw new Error('no session');
    }

    const { userId } = await sessionRes.json();
    document.getElementById('welcome').textContent = `Logged in as: ${userId}`;

    // List credentials
    const credsRes = await fetch(`/auth/credentials/${userId}`, {
      headers: { Authorization: `Bearer ${sessionId}` }
    });
    const credentials = await credsRes.json();
    const credsList = document.getElementById('credentials-list');

    if (credentials.length === 0) {
      credsList.innerHTML = '<p>No credentials registered.</p>';
    } else {
      credentials.forEach(cred => {
        const div = document.createElement('div');
        div.innerHTML = `<p><strong>${cred.name}</strong> — registered ${new Date(cred.registeredAt * 1000).toLocaleDateString()}, used ${cred.signCount} times</p>
          <button onclick="revoke('${cred.credentialId}')">Revoke</button><hr>`;
        credsList.appendChild(div);
      });
    }

    window.signOut = function() {
      document.cookie = 'knock_session=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
      window.location = '/login.html';
    };

    window.revoke = async function(credentialId) {
      await fetch(`/auth/credentials/${credentialId}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${sessionId}` }
      });
      window.location.reload();
    };
  </script>
</body>
</html>
